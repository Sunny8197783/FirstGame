<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Pawn Shop: 지하경제</title>
</head>
<body class="theme-day">

<div id="app">
  <div id="hud" class="panel" style="display:none">
    <span class="gold accent" id="hud-gold">💰 5,000 G</span>
    <span id="hud-debt" class="bad" style="font-size:14px"></span>
    <span id="hud-phase">☀️ 낮 — 전당포</span>
    <span id="hud-day">📅 1일차</span>
    <span id="hud-time" class="dim"></span>
    <span id="hud-parts" class="accent"></span>
    <span class="hud-icons">
      <button class="hud-ico" title="플레이 방법" onclick="renderHowTo()">❓</button>
      <button class="hud-ico" title="감정 수첩" onclick="renderMasteryBook()">📖</button>
      <button class="hud-ico" title="통계" onclick="renderStats()">📈</button>
      <button class="hud-ico" title="확률 정보" onclick="renderOddsInfo()">📊</button>
      <button class="hud-ico" title="업적" onclick="renderAchievements()">🏆</button>
      <button class="hud-ico" title="설정" onclick="renderSettings()">⚙️</button>
    </span>
    <button id="btn-endnow" class="btn-ghost" style="font-size:13px; padding:4px 10px; margin:0">결과 화면 보기</button>
  </div>
  <div id="event-banner" class="panel" style="display:none; padding:8px 16px; font-size:14px"></div>
  <div id="screen"></div>
</div>

<div id="overlay"></div>
<div id="modal"><div class="inner panel" id="modal-body"></div></div>
<div id="debug"></div>
<div id="toast-wrap"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
