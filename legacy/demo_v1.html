<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idle Pawn Shop: 지하경제 — 재미 검증 데모</title>
<style>
@font-face {
  font-family: 'Galmuri11';
  src: url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11.woff2') format('woff2');
  font-weight: normal; font-style: normal; font-display: swap;
}
:root {
  --px: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Galmuri11', 'DungGeunMo', monospace;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  transition: background 0.8s ease, color 0.8s ease;
  image-rendering: pixelated;
  padding-bottom: 40px;
}
/* ── 낮 테마: 앰버/브라운 ───────────────────── */
body.theme-day {
  background: linear-gradient(180deg, #3a2417 0%, #241207 100%);
  color: #f5deb3;
}
body.theme-day .panel { background: #52351d; border-color: #8a5a2b; }
body.theme-day .accent { color: #ffb347; }
/* ── 저녁 테마 ───────────────────── */
body.theme-evening {
  background: linear-gradient(180deg, #4a2030 0%, #1e0e18 100%);
  color: #f0d8c8;
}
body.theme-evening .panel { background: #4d2a35; border-color: #8a4a5b; }
body.theme-evening .accent { color: #ff9e7a; }
/* ── 밤 테마: 네이비 + 네온 ───────────────────── */
body.theme-night {
  background: linear-gradient(180deg, #0d1030 0%, #050514 100%);
  color: #c8d8ff;
}
body.theme-night .panel { background: #141a45; border-color: #2f3a8f; }
body.theme-night .accent { color: #00f0ff; }
body.theme-night .neon-pink { color: #ff44aa; }

/* 픽셀 테두리(계단식 box-shadow) */
.panel {
  border: var(--px) solid;
  padding: 18px;
  margin: 10px 0;
  position: relative;
  box-shadow:
    0 var(--px) 0 rgba(0,0,0,0.45),
    var(--px) 0 0 rgba(0,0,0,0.45),
    var(--px) var(--px) 0 rgba(0,0,0,0.45),
    inset 0 var(--px) 0 rgba(255,255,255,0.07);
}
#app { width: 100%; max-width: 1000px; padding: 12px; }
#hud {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 18px; padding: 10px 16px; margin-top: 8px;
}
#hud .gold { font-size: 22px; }
h1 { font-size: 30px; text-align: center; line-height: 1.4; }
h2 { font-size: 22px; margin-bottom: 10px; }
h3 { font-size: 18px; margin-bottom: 6px; }
p, li { line-height: 1.7; font-size: 16px; }
button {
  font-family: inherit; font-size: 17px; cursor: pointer;
  padding: 10px 18px; margin: 6px 4px;
  border: var(--px) solid #000; color: #fff;
  background: #7a4a1e;
  box-shadow: 0 var(--px) 0 #000, inset 0 var(--px) 0 rgba(255,255,255,0.25);
}
button:hover { filter: brightness(1.15); }
button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
body.theme-night button { background: #23308f; }
body.theme-night button.btn-pink { background: #a01a66; }
button.btn-ghost { background: #444; }
button.btn-big { font-size: 20px; padding: 14px 30px; }
input[type=range] { width: 100%; accent-color: #ffb347; height: 28px; }
body.theme-night input[type=range] { accent-color: #00f0ff; }
input[type=number] {
  font-family: inherit; font-size: 18px; width: 130px;
  padding: 6px; border: 3px solid #000; background: #1c1008; color: #ffd98a;
}
body.theme-night input[type=number] { background: #080a20; color: #9ff; }
.portrait {
  font-size: 56px; line-height: 1;
  display: inline-block; padding: 12px;
  background: rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.15);
}
.speech { font-size: 16px; padding: 10px 14px; margin: 8px 0;
  background: rgba(0,0,0,0.25); border-left: 5px solid rgba(255,255,255,0.3); }
.hint { padding: 6px 10px; margin: 4px 0; font-size: 15px;
  background: rgba(255,255,255,0.06); border-left: 4px solid #ffb347; }
body.theme-night .hint { border-left-color: #00f0ff; }
.tag { display: inline-block; padding: 2px 8px; font-size: 13px;
  background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); margin: 2px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
.col { flex: 1; min-width: 220px; }
.center { text-align: center; }
.big { font-size: 26px; }
.huge { font-size: 40px; }
.good { color: #7dff7d; }
.bad { color: #ff6b6b; }
.dim { opacity: 0.65; font-size: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 15px; }
td, th { padding: 6px 8px; border-bottom: 2px solid rgba(255,255,255,0.12); text-align: right; }
td:first-child, th:first-child { text-align: left; }

/* HP 바 */
.hpbar-wrap { background: #000; border: 3px solid rgba(255,255,255,0.3); height: 26px; position: relative; margin: 4px 0; }
.hpbar { height: 100%; background: linear-gradient(90deg, #ff44aa, #ff8866); transition: width 0.45s steps(6); }
.hpbar.cyan { background: linear-gradient(90deg, #00f0ff, #4488ff); }
.fightlog { min-height: 120px; max-height: 175px; overflow-y: auto; font-size: 15px; line-height: 1.9; padding: 10px;
  background: rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.15); }
.fighter-card {
  flex: 1; min-width: 200px; padding: 12px; cursor: pointer;
  background: rgba(0,0,0,0.25); border: 4px solid rgba(255,255,255,0.15);
  transition: border-color 0.15s;
}
.fighter-card.selected { border-color: #00f0ff; background: rgba(0,240,255,0.12); }
.fighter-card:hover { border-color: rgba(255,255,255,0.5); }
.statbar { display: inline-block; letter-spacing: 1px; }

/* 전환 오버레이 */
#overlay {
  position: fixed; inset: 0; z-index: 50;
  display: none; align-items: center; justify-content: center;
  background: #000; color: #fff; font-size: 30px; text-align: center;
  flex-direction: column; gap: 12px;
}
#overlay.show { display: flex; animation: fadein 0.35s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

/* 피드백 모달 */
#modal {
  position: fixed; inset: 0; z-index: 40; display: none;
  align-items: center; justify-content: center; background: rgba(0,0,0,0.72);
}
#modal.show { display: flex; }
#modal .inner { max-width: 520px; width: 92%; }

/* 디버그 패널 */
#debug {
  position: fixed; top: 8px; right: 8px; z-index: 60; display: none;
  background: rgba(0,0,0,0.88); color: #0f0; font-size: 13px;
  padding: 10px; border: 2px solid #0f0; max-width: 300px; line-height: 1.6;
  font-family: monospace;
}
#debug.show { display: block; }
.blink { animation: blink 0.9s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0.25; } }
.drop-fx { font-size: 22px; color: #ffe14d; text-shadow: 0 0 8px #ffaa00; }

/* ── 손님 등장 연출: 물건을 들고 걸어 들어온다 ── */
@keyframes walk-in {
  from { transform: translateX(-320px); }
  to   { transform: translateX(0); }
}
.walk-in { animation: walk-in 0.9s steps(8) both; }
.face { display: inline-block; animation: idlebob 1.6s steps(2) infinite; }
.carry { display: inline-block; font-size: 26px; transform: translate(-16px, 16px); }
@keyframes drop-in {
  0%   { transform: translateY(-44px) scale(0.5); opacity: 0; }
  60%  { transform: translateY(6px)  scale(1.08); opacity: 1; }
  100% { transform: translateY(0)    scale(1); }
}
.drop-in { animation: drop-in 0.5s 0.85s steps(5) both; }

/* ── 아이템 실물 진열대: 외관 마크(흠집/광택)가 가치 단서 ── */
.item-stage { position: relative; width: 150px; height: 128px; margin: 0 auto;
  background: rgba(0,0,0,0.35); border: 3px solid rgba(255,255,255,0.2); }
.item-stage .shelf { position: absolute; bottom: 0; width: 100%; height: 16px;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.10) 0 14px, rgba(255,255,255,0.04) 14px 28px); }
.item-stage .item-body { font-size: 62px; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -58%); line-height: 1; }
.item-stage .mark { position: absolute; font-size: 17px; filter: drop-shadow(0 0 2px #000); }
@keyframes sparkle { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
.mark.sparkle { animation: sparkle 1.1s steps(2) infinite; }

/* ── 씬 레이아웃 (배경 일러스트 느낌의 풀 화면 구도) ── */
.scene { position: relative; border: var(--px) solid #000; margin-top: 10px; padding: 12px; overflow: hidden;
  box-shadow: 0 var(--px) 0 rgba(0,0,0,0.45), inset 0 0 60px rgba(0,0,0,0.35); }
/* 낮: 전당포 내부 — 선반, 카운터, 창문 빛 */
.scene-day { background: linear-gradient(180deg, #6b4a2a 0%, #58371c 55%, #3a2413 100%); }
.scene-day::before { content: ''; position: absolute; right: 6%; top: 0; width: 150px; height: 200px;
  background: linear-gradient(205deg, rgba(255,220,150,0.22), transparent 65%); pointer-events: none; }
.shop-shelf { position: absolute; left: 3%; right: 3%; height: 30px; text-align: center;
  background: linear-gradient(180deg, #7a5230, #4a2e15); border: 3px solid #2a1608;
  font-size: 18px; line-height: 30px; letter-spacing: 8px; overflow: hidden;
  opacity: 0.9; pointer-events: none; box-shadow: 0 4px 0 rgba(0,0,0,0.4); }
.shop-shelf.sh1 { top: 8px; }
.shop-shelf.sh2 { top: 50px; }
.shop-counter { position: absolute; bottom: 0; left: 0; right: 0; height: 44px; pointer-events: none;
  background: repeating-linear-gradient(90deg, #7a4a22 0 32px, #6b3f1c 32px 64px);
  border-top: 4px solid #2a1608; box-shadow: inset 0 6px 8px rgba(0,0,0,0.3); }
.day-grid { position: relative; display: grid; grid-template-columns: 250px 1fr 250px;
  gap: 12px; margin-top: 86px; margin-bottom: 30px; z-index: 2; align-items: start; }
@media (max-width: 860px) { .day-grid, .night-grid { grid-template-columns: 1fr !important; } }
/* 초상 프레임 + 말풍선 + 신뢰도 라벨 */
.pframe { width: 84px; height: 84px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 52px; line-height: 1; background: radial-gradient(circle at 50% 32%, rgba(255,255,255,0.18), rgba(0,0,0,0.45));
  border: 4px solid #000; box-shadow: inset 0 0 0 3px rgba(255,255,255,0.15); }
.bubble { background: #f7ecd7; color: #3a2413; border: 3px solid #000; padding: 8px 10px;
  font-size: 14px; line-height: 1.55; position: relative; margin-top: 12px;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.5); }
.bubble::before { content: ''; position: absolute; top: -13px; left: 22px;
  border: 7px solid transparent; border-bottom-color: #000; }
body.theme-night .bubble { background: #0d1338; color: #cfe0ff; border-color: #3a4aa8; }
.trust { font-size: 12px; margin-top: 4px; opacity: 0.9; }
.trust.low { color: #c0392b; } .trust.mid { color: #8a6d1a; } .trust.high { color: #1e8449; }
body.theme-night .trust.low { color: #ff6b6b; }
body.theme-night .trust.mid { color: #ffd98a; }
body.theme-night .trust.high { color: #7dff7d; }
.loupe { position: absolute; right: -12px; bottom: -6px; font-size: 30px; filter: drop-shadow(0 0 3px #000); }
/* 밤: 지하 격투장 — 관중, 네온, 링 */
.scene-night { background: linear-gradient(180deg, #0a0d28 0%, #05051a 100%); }
.crowd { position: absolute; left: 0; right: 0; bottom: 0; height: 55%; pointer-events: none; opacity: 0.8;
  background-image:
    radial-gradient(circle at 12px 12px, #171d48 0 8px, transparent 9px),
    radial-gradient(circle at 28px 26px, #10153a 0 8px, transparent 9px);
  background-size: 36px 28px, 44px 32px; }
.neon { position: absolute; top: 8px; width: 90px; height: 8px; pointer-events: none; }
.neon-l { left: 5%; background: #ff44aa; box-shadow: 0 0 20px 5px rgba(255,68,170,0.8); }
.neon-r { right: 5%; background: #00f0ff; box-shadow: 0 0 20px 5px rgba(0,240,255,0.8); }
.hp-row { position: relative; z-index: 2; display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.hp-row .hpbar-wrap { flex: 1; }
.night-grid { position: relative; z-index: 2; display: grid; grid-template-columns: 240px 1fr 240px;
  gap: 10px; align-items: start; margin-bottom: 10px; }
.night-grid .panel { margin: 0; padding: 10px; }
.ring { position: relative; height: 300px; background: #12173d; border: 4px solid #000; overflow: hidden;
  box-shadow: 0 0 26px rgba(255,68,170,0.25), 0 0 26px rgba(0,240,255,0.18), inset 0 -30px 40px rgba(0,0,0,0.5); }
.ring-ropes i { position: absolute; left: 0; right: 0; height: 3px;
  background: #d03a3a; box-shadow: 0 0 6px rgba(255,70,70,0.7); }
.ring-ropes i:nth-child(1) { top: 34px; }
.ring-ropes i:nth-child(2) { top: 64px; }
.ring-ropes i:nth-child(3) { top: 94px; }
.ring .ring-floor { position: absolute; bottom: 0; height: 84px; width: 100%;
  background: repeating-linear-gradient(90deg, #23234a 0 28px, #1c1c3c 28px 56px); border-top: 3px solid #000; }
/* ── 격투가 리그: 팔다리가 있는 관절 캐릭터 ── */
.sprite-pos { position: absolute; bottom: 74px; width: 48px; height: 70px; z-index: 2;
  transition: transform 0.2s steps(4); }
#sprite-A { left: 15%; }
#sprite-B { right: 15%; }
#sprite-B .flip { transform: scaleX(-1); }
.flip { width: 100%; height: 100%; }
.rig { position: relative; width: 48px; height: 70px; }
.rig > div { position: absolute; border: 3px solid #14100a; box-sizing: border-box; }
.f-head { left: 13px; top: 0; width: 22px; height: 17px; background: #e8b48c;
  box-shadow: inset -4px 3px 0 rgba(0,0,0,0.15); z-index: 2; }
.f-body { left: 11px; top: 15px; width: 26px; height: 26px; background: var(--c);
  box-shadow: inset -5px -4px 0 rgba(0,0,0,0.2); z-index: 1; }
.f-arm { top: 17px; width: 11px; height: 25px; background: var(--c);
  transform-origin: 50% 5px; box-shadow: inset -3px 0 0 rgba(0,0,0,0.2); }
.f-arm::after { content: ''; position: absolute; bottom: -1px; left: 1px; width: 5px; height: 4px; background: #e8b48c; }
.f-arm.front { left: 31px; z-index: 3; }
.f-arm.back { left: 6px; z-index: 0; }
.f-leg { top: 39px; width: 12px; height: 29px; background: #2c3242;
  transform-origin: 50% 4px; box-shadow: inset -3px 0 0 rgba(0,0,0,0.25); }
.f-leg.front { left: 25px; z-index: 2; }
.f-leg.back { left: 11px; z-index: 0; }
/* ── 이동 (outer 포지셔너) ── */
#sprite-A.go { transform: translateX(150px); }
#sprite-B.go { transform: translateX(-150px); }
#sprite-A.go-fly { animation: flyA 0.5s steps(6) both; }
#sprite-B.go-fly { animation: flyB 0.5s steps(6) both; }
@keyframes flyA { 45% { transform: translate(80px, -46px); } 100% { transform: translate(150px, -4px); } }
@keyframes flyB { 45% { transform: translate(-80px, -46px); } 100% { transform: translate(-150px, -4px); } }
#sprite-A.dodge { transform: translateX(-38px); }
#sprite-B.dodge { transform: translateX(38px); }
#sprite-A.ko { transform: rotate(-84deg) translateY(14px); opacity: 0.8; }
#sprite-B.ko { transform: rotate(84deg) translateY(14px); opacity: 0.8; }

/* ── 기술 모션 (inner .rig — B는 .flip이 자동 미러링) ── */
@keyframes a-punch { 35%, 70% { transform: rotate(-94deg); } }
.rig.act-punch .f-arm.front { animation: a-punch 0.36s steps(3) both; }
@keyframes a-kick { 35%, 70% { transform: rotate(-84deg); } }
.rig.act-kick .f-leg.front { animation: a-kick 0.36s steps(3) both; }
@keyframes r-lean { 50% { transform: rotate(10deg); } }
.rig.act-kick { animation: r-lean 0.36s steps(3) both; }
@keyframes r-crouch { 45%, 80% { transform: translateY(11px) rotate(6deg); } }
.rig.act-sweep, .rig.act-lowblow { animation: r-crouch 0.4s steps(3) both; }
@keyframes a-sweep { 45%, 80% { transform: rotate(-74deg); } }
.rig.act-sweep .f-leg.front { animation: a-sweep 0.4s steps(3) both; }
@keyframes a-lowpunch { 45%, 80% { transform: rotate(-52deg); } }
.rig.act-lowblow .f-arm.front { animation: a-lowpunch 0.4s steps(3) both; }
.rig.act-flykick .f-leg.front { animation: a-kick 0.5s steps(4) both; }
.rig.act-flykick .f-leg.back { animation: a-lowpunch 0.5s steps(4) both; }
.rig.act-flypunch .f-arm.front { animation: a-punch 0.5s steps(4) both; }
@keyframes r-throw { 35% { transform: rotate(-22deg) translateY(7px); } 70% { transform: rotate(16deg); } }
.rig.act-throw { animation: r-throw 0.5s steps(4) both; }
.rig.act-throw .f-arm.front, .rig.act-throw .f-arm.back { animation: a-punch 0.5s steps(4) both; }
@keyframes r-slam { 40%, 100% { transform: rotate(-88deg); } }
.rig.act-slam { animation: r-slam 0.5s steps(4) both; }

/* ── 피격 리액션 ── */
@keyframes shake { 0%,100% { margin-left: 0; } 25% { margin-left: -9px; } 75% { margin-left: 9px; } }
.sprite-pos.rx-hit { animation: shake 0.34s steps(4) 1; }
.sprite-pos.rx-hit .rig { filter: brightness(2) sepia(1) hue-rotate(-45deg); }
#sprite-A.rx-thrown { animation: thrownA 0.8s steps(8) both; }
#sprite-B.rx-thrown { animation: thrownB 0.8s steps(8) both; }
@keyframes thrownA { 35% { transform: translate(-34px, -46px) rotate(-160deg); } 70% { transform: translate(-56px, 8px) rotate(-262deg); } 100% { transform: translate(-52px, 12px) rotate(-268deg); } }
@keyframes thrownB { 35% { transform: translate(34px, -46px) rotate(160deg); } 70% { transform: translate(56px, 8px) rotate(262deg); } 100% { transform: translate(52px, 12px) rotate(268deg); } }
#sprite-A.rx-tripped { animation: tripA 0.55s steps(5) both; }
#sprite-B.rx-tripped { animation: tripB 0.55s steps(5) both; }
@keyframes tripA { 100% { transform: translate(-16px, 10px) rotate(-76deg); } }
@keyframes tripB { 100% { transform: translate(16px, 10px) rotate(76deg); } }
@keyframes r-squash { 45% { transform: translateY(18px) scaleY(0.5); } 100% { transform: translateY(14px) scaleY(0.65); } }
.sprite-pos.rx-slammed .rig { animation: r-squash 0.55s steps(4) both; }
@keyframes r-doubleover { 50%, 100% { transform: translateY(10px) rotate(24deg); } }
.sprite-pos.rx-lowblow .rig { animation: r-doubleover 0.6s steps(4) both; }
/* 각성: 금빛 섬광 */
@keyframes awaken-flash { 0%,100% { filter: none; } 50% { filter: brightness(2.4) sepia(1) hue-rotate(-20deg) drop-shadow(0 0 12px #ffd23e); } }
.sprite-pos.awaken .rig { animation: awaken-flash 0.45s steps(3) 4; }

@keyframes idlebob { 50% { margin-bottom: 9px; } }
.sprite-pos.idle { animation: idlebob 1s steps(2) infinite; }
@keyframes winjump { 0%,100% { margin-bottom: 0; } 50% { margin-bottom: 26px; } }
.sprite-pos.win-pose { animation: winjump 0.45s steps(3) 4; }
.fx-pop { position: absolute; bottom: 148px; font-size: 38px; z-index: 4; pointer-events: none;
  animation: fxpop 0.55s steps(5) both; }
@keyframes fxpop { from { opacity: 1; transform: scale(0.4); } to { opacity: 0; transform: scale(1.7); } }
.dmg-float { position: absolute; bottom: 138px; font-size: 19px; color: #ff5577; z-index: 3;
  text-shadow: 0 0 4px #000; animation: dmg-rise 0.75s steps(6) both; pointer-events: none; }
.dmg-float.crit { font-size: 27px; color: #ffdd33; }
.dmg-float.miss { font-size: 15px; color: #9fd8ff; }
@keyframes dmg-rise { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-42px); } }

/* ── 귀여운 공통 연출 ── */
@keyframes pop-in { from { transform: scale(0.3); opacity: 0; } }
@keyframes fade-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
#modal .inner { animation: pop-in 0.28s cubic-bezier(.34,1.56,.64,1) both; }
.day-grid > .panel, .night-grid > * { animation: fade-up 0.45s both; }
.day-grid > .panel:nth-child(2), .night-grid > :nth-child(2) { animation-delay: 0.12s; }
.day-grid > .panel:nth-child(3), .night-grid > :nth-child(3) { animation-delay: 0.24s; }
@keyframes itemfloat { 0%,100% { transform: translate(-50%, -55%); } 50% { transform: translate(-50%, -64%); } }

// 픽셀아트 렌더러: 1px 격자를 box-shadow로 그린다. 데이터가 없으면 이모지 폴백.
function pixelArtHTML(item, sc) {
  const art = PIXEL_ART[item.name];
  if (!art) return `<span class="item-body">${item.emoji}</span>`;
  sc = sc || 6;
  const sh = [];
  art.r.forEach((row, y) => {
    for (let x = 0; x < row.length; x++) {
      const col = art.p[row[x]];
      if (col) sh.push(`${(x + 1) * sc}px ${(y + 1) * sc}px 0 0 ${col}`);
    }
  });
  const w = Math.max(...art.r.map(r => r.length)), h = art.r.length;
  return `<div class="px-wrap"><div class="pxart" style="left:${-((w / 2 + 1) * sc)}px; top:${-((h / 2 + 1) * sc)}px; width:${sc}px; height:${sc}px; box-shadow:${sh.join(',')}"></div></div>`;
}

// Web Audio 삑삑이 (선택사항 — 실패해도 무시)
let audioCtx = null;
function beep(freq, dur, type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 사운드 없어도 무방 */ }
}

              bets: 0, betWins: 0, betPL: 0, houseEstSum: 0, drops: 0, loans: 0, sponsorIncome: 0,
              playerFights: 0, playerWins: 0, challengePL: 0 };
  // 파이터 초기화: 스탯 ±JITTER 랜덤 변동(매 판 다른 전력) + 초기 전적 시드
  const J = CONFIG.FIGHTER_STAT_JITTER;
  S.fighters = FIGHTERS_DATA.map(f => ({ ...f,
    atk: clamp(f.atk + randInt(-J, J), 1, 10),

    spd: clamp(f.spd + randInt(-J, J), 1, 10),
    w: randInt(2, 5), l: randInt(1, 4) }));
  startDay();
}

function afterInterlude() {
  sndClick();
  const f = S._afterInterlude; S._afterInterlude = null;
  if (f) f();
}

function startDay() {
  S.day++;
  // ── 막 전환 판정 ──
  if (S.day === CONFIG.ACT1_END + 1) {
    // 8일차 아침: 김사장이 남은 빚을 강제 회수한다
    if (S.debt <= 0) { renderInterlude('act2', 0, beginDay); return; }
    if (S.gold >= S.debt) {
      const collected = S.debt;
      S.gold -= collected; S.debt = 0;
      updateHUD();
      renderInterlude('act2', collected, beginDay);
    } else {
      S.endingId = 'debt_fail';
      renderResult();
    }
    return;
  }
  if (S.day === CONFIG.ACT2_END + 1) {
    // 15일차 아침: 회장의 시험 판정 (순자산 기준)
    const net = S.gold - S.debt;
    if (net >= CONFIG.ACT2_TARGET) {
      renderInterlude('act3', net, beginDay);
    } else {
      S.endingId = 'act2_fail';
      renderResult();
    }
    return;
  }
  beginDay();
}

function beginDay() {
  let loanMsg = '';
  if (S.gold < CONFIG.BANKRUPT_FLOOR) {
    const borrowed = CONFIG.BANKRUPT_FLOOR - S.gold;
    S.gold = CONFIG.BANKRUPT_FLOOR;
    S.debt += borrowed; // 빌린 만큼 빚에 가산
    S.stats.loans++;
    loanMsg = `<p class="bad" style="font-size:18px">💸 김사장이 혀를 차며 ${fmt(borrowed)} G를 얹어줬다... 물론 빚이다.</p>`;
  }
  // 김사장 빚 이자 (2일차 아침부터 복리)
  let debtLine = '';
  if (S.day === 1) {
    debtLine = `<div style="font-size:15px; color:#ff6b6b; margin-top:6px">💸 김사장: "개업 축하하네. 빚 ${fmt(CONFIG.DEBT_START)} G — 7일 뒤에 받으러 오지. 이자는 매일 ${Math.round(CONFIG.DEBT_INTEREST * 100)}%야."</div>`;
  } else if (S.debt > 0) {
    S.debt = Math.round(S.debt * (1 + CONFIG.DEBT_INTEREST) / 100) * 100;
    debtLine = `<div style="font-size:15px; color:#ff6b6b; margin-top:6px">💸 남은 빚 ${fmt(S.debt)} G (이자 +${Math.round(CONFIG.DEBT_INTEREST * 100)}% 반영)</div>`;
  }
  // 일일 이벤트 추첨 (1일차는 튜토리얼 성격으로 평범한 날 고정)
  S.event = S.day === 1 ? DAILY_EVENTS[0] : pickWeighted(DAILY_EVENTS);
  S.phase = 'day'; S.customers = genCustomers(); S.custIdx = 0; S.purchases = [];
  setTheme('day'); updateHUD();
  const evLine = S.event.id !== 'normal'
    ? `<div style="font-size:18px; color:#ffb347; margin-top:6px">${S.event.name}<br><span style="font-size:14px; opacity:0.85">${S.event.desc}</span></div>` : '';
  // 막 목표 리마인더
  const goalLine = actOf() === 2
    ? `<div style="font-size:13px; color:#8fa3ff; margin-top:6px">🎯 회장의 시험: ${CONFIG.ACT2_END}일차까지 순자산 ${fmt(CONFIG.ACT2_TARGET)} G (현재 ${fmt(S.gold - S.debt)} G)</div>`
    : actOf() === 3
      ? `<div style="font-size:13px; color:#ff9edb; margin-top:6px">👑 ${CONFIG.DAYS}일차 밤, 그랜드 파이널 — 최대한 불려라</div>` : '';
  showTransition(`<div>☀️</div><div>${S.day}일차 아침</div><div style="font-size:16px;opacity:0.7">전당포 문을 연다${loanMsg ? '' : '...'}</div>${loanMsg}${debtLine}${goalLine}${evLine}`, renderCustomer, S.event.id !== 'normal' || S.day === 1 ? 2000 : 1600);
}

function actOf() { return S.day <= CONFIG.ACT1_END ? 1 : S.day <= CONFIG.ACT2_END ? 2 : 3; }
function customersPerDay() {
  return CONFIG.CUSTOMERS_PER_DAY
    + (S.upgrades && S.upgrades.expand ? 1 : 0)
    + (S.upgrades && S.upgrades.remodel ? 1 : 0);
}

function genCustomers() {
  const n = customersPerDay();
  // 현재 막에서 풀린 매물만 유통 + 현재 골드로 정가 매입이 가능한 아이템 우선 배치
  const pool = ITEMS.filter(it => (it.act || 1) <= actOf());
  const budget = Math.max(S.gold, 2000);
  const aff = shuffle(pool.filter(it => (it.lo + it.hi) / 2 * CONFIG.AFFORD_RATE <= budget));
  const rest = shuffle(pool.filter(it => !aff.includes(it)));
  const itemPool = shuffle(aff.slice(0, n - 1)
    .concat(rest.length ? [rest[0]] : [])
    .concat(aff.slice(n - 1)).concat(rest.slice(1)));
  // 큰손 이벤트 또는 '큰손 인맥' 업그레이드: 손님 하나는 반드시 고가품을 들고 온다
  if ((S.event && S.event.vip) || S.upgrades.bigshot) {
    const lux = pool.filter(it => it.hi >= 18000);
    if (lux.length) itemPool[randInt(0, n - 1)] = pick(lux);
  }
  return Array.from({ length: n }, (_, i) => {
    const ctype = pick(CUSTOMER_TYPES);
    const item = itemPool[i % itemPool.length];
    const V = Math.round(rand(item.lo, item.hi) / 100) * 100;
    // 단골: 같은 유형과 REGULAR_DEALS_REQ회 이상 거래 성사 → 더 싸게 넘겨준다
    const regular = (S.regularDeals[ctype.type] || 0) >= CONFIG.REGULAR_DEALS_REQ;
    const desperation = Math.max(0.5, rand(ctype.desp[0], ctype.desp[1]) - (regular ? CONFIG.REGULAR_DESP_DISCOUNT : 0));
    let M = Math.round(V * desperation);
    // 밀당 흥정 파라미터: 첫 요구가(앵커 — 유형별 뻥튀기/투매 성향), 인내심
    let asking = Math.max(M + 300, Math.round(V * rand(ctype.ask[0], ctype.ask[1]) / 100) * 100);
    let patience = ctype.pat;
    // 🚨 장물: 수상한 부류가 터무니없이 싸게 서둘러 던진다 — 너무 싼 건 이유가 있다
    const stolen = !!ctype.shady && Math.random() < CONFIG.STOLEN_RATE;
    if (stolen) {
      asking = Math.round(V * rand(0.45, 0.60) / 100) * 100;
      M = Math.min(M, Math.round(V * rand(0.33, 0.48)));
      patience = 2;
    }
    // 🎉 숨은 진품: 저녁 되팔이 때 가치 ×2로 판명 (아무도 모른다)
    const jackpot = !stolen && Math.random() < CONFIG.JACKPOT_RATE;
    // 힌트 생성: 가치의 위치(t)에 따라 방향성 힌트 선택
    const t = (V - item.lo) / (item.hi - item.lo);
    const dir = t >= 0.55 ? 'high' : t <= 0.45 ? 'low' : 'mid';
    let hints = [];
    if (dir === 'mid') {
      hints = [ { text: pick(item.high), trap: false }, { text: pick(item.low), trap: false } ];
    } else {
      const pool = shuffle(item[dir]);
      hints = [ { text: pool[0], trap: false }, { text: pool[1 % pool.length], trap: false } ];
    }
    if (Math.random() < 0.5) hints.push({ text: pick(NEUTRAL_HINTS), trap: false });
    // 함정 힌트: 실제 방향과 반대를 가리키는 힌트로 교체
    const trapRate = ctype.swindler ? CONFIG.TRAP_HINT_RATE_SWINDLER : CONFIG.TRAP_HINT_RATE;
    let hasTrap = false;
    if (Math.random() < trapRate) {
      hasTrap = true;
      const trapPool = dir === 'high' ? item.trapLow : dir === 'low' ? item.trapHigh
                     : (Math.random() < 0.5 ? item.trapHigh : item.trapLow);
      hints[randInt(0, Math.min(1, hints.length - 1))] = { text: pick(trapPool), trap: true };
    }
    // 실물 검수: 부위별 상태 점수(1~5). 진짜 가치 위치(t)에서 나오되,
    // 부위마다 VISUAL_NOISE_RATE 확률로 ±1 오차가 생긴다 (⚖️ 정밀 저울 보유 시 오차 없음)
    const partNames = ITEM_PARTS[item.name] || ['외관', '상태', '마감'];
    const baseScore = clamp(Math.round(t * 4) + 1, 1, 5);
    const partsView = partNames.map(pn => {
      let sc = baseScore;
      if (!S.upgrades.scale && Math.random() < CONFIG.VISUAL_NOISE_RATE) sc = clamp(sc + (Math.random() < 0.5 ? -1 : 1), 1, 5);
      return { name: pn, score: sc, desc: pick(STATE_DESC[sc - 1]) };
    });
    const avgScore = partsView.reduce((s, p) => s + p.score, 0) / partsView.length;
    // 진열대 마크는 검수 점수와 일치하도록 파생 (정보 채널이 어긋나지 않게)
    const DEFECTS = ['💥', '🩹', '🕸️'];
    const nDef = avgScore <= 1.8 ? 3 : avgScore <= 2.6 ? 2 : avgScore <= 3.3 ? 1 : 0;
    const nSpark = avgScore >= 4.5 ? 2 : avgScore >= 3.8 ? 1 : 0;
    const marks = shuffle(DEFECTS).slice(0, nDef).map(e => ({ e, spark: false }))
      .concat(Array.from({ length: nSpark }, () => ({ e: '✨', spark: true })))
      .map(mk => ({ ...mk, x: randInt(6, 74), y: randInt(6, 62) }));
    return {
      name: pick(CUSTOMER_NAMES), ctype, item, V, M, desperation, regular, t,
      asking, patience, stolen, jackpot,
      hints: shuffle(hints), hasTrap, line: pick(ctype.lines), marks, nDef, nSpark, partsView,
    };
  });
}

          <button class="btn-ghost" id="btn-take" style="width:100%; margin:0 0 4px" onclick="acceptDemand()" ${c.asking > S.gold ? 'disabled' : ''}>요구가에 산다 (${fmt(c.asking)} G)</button>
          <button class="btn-ghost" style="width:100%; margin:0" onclick="passCustomer()">거절하고 보낸다</button>
          <p class="dim" style="font-size:11px; margin-top:6px">깎을수록 남는다 — 하지만 너무 후려치면 화내며 떠난다. 진짜 가치는 저녁 정산에서 판명된다.</p>
        </div>
      </div>
    </div>`;
  const slider = $('offer-slider'), input = $('offer-input');
  const sync = (v) => {
    v = clamp(Math.round(v / 100) * 100 || sliderMin, sliderMin, sliderMax);
    slider.value = v; input.value = v;
    const short = v > S.gold;
    $('gold-warn').style.display = short ? 'block' : 'none';
    $('btn-offer').disabled = short;
  };
  slider.addEventListener('input', () => sync(+slider.value));
  input.addEventListener('input', () => sync(+input.value));
  sync(start);
  updateDebug();
}

/* ── 밀당 흥정 엔진 ──
   손님의 현재 요구가 D와 숨은 최저 수락가 M 사이에서 라운드를 주고받는다.
   낮게 부를수록 D가 내려오지만 인내심이 깎이고, 모욕 수준이면 박차고 나간다. */
function haggleSay(kind, text) {
  const H = S.haggle, c = S.customers[S.custIdx];
  $('hg-demand').textContent = fmt(H.D) + ' G';
  $('hg-mood').innerHTML = `기분 ${MOOD_FACES[Math.min(Math.max(H.P, 0) + (kind === 'insult' ? 0 : 2), 5)]} · 인내심 ${'❤️'.repeat(Math.max(H.P, 0)) || '💢'}`;
  $('hg-say').innerHTML = text || pick(HAGGLE_LINES[kind]).replaceAll('{D}', fmt(H.D) + ' G');
  const take = $('btn-take');
  take.textContent = `요구가에 산다 (${fmt(H.D)} G)`;
  take.disabled = H.D > S.gold;
  $('offer-slider').max = H.D;
  $('offer-input').max = H.D;
  beep(kind === 'insult' ? 180 : 392, 0.08);
}

function makeOffer() {
  const c = S.customers[S.custIdx], H = S.haggle;
  if (!H) return;
  const X = clamp(Math.round((+($('offer-input').value) || 0) / 100) * 100, 100, 999999);
  if (X > S.gold) return;
  sndClick();
  if (X >= H.D) { closeDeal(c, H.D, 'acceptEasy'); return; } // 요구가 이상이면 그 값에 즉시 성사
  if (X < c.M * CONFIG.INSULT_RATIO) {
    // 모욕적인 제시 — 인내심 -2, 요구가는 꿈쩍도 안 한다
    H.P -= 2;
    if (H.P <= 0) { walkOut(c, X); return; }
    haggleSay('insult');
  } else if (X >= c.M) {
    // 수락 가능한 가격대: 충분히 후하거나 인내심이 바닥이면 수락, 아니면 한 번 더 밀당
    const gap = (X - c.M) / Math.max(H.D - c.M, 1);
    if (gap >= CONFIG.ACCEPT_GAP || H.P <= 1) { closeDeal(c, X, 'accept'); return; }
    H.P -= 1;
    H.D = Math.max(Math.round((H.D + X) / 2 / 100) * 100, X + 100);
    haggleSay('counter');
  } else {
    // 최저가 미만 (모욕까진 아님): 요구가가 내려오지만 인내심 소모
    H.P -= 1;
    if (H.P <= 0) { walkOut(c, X); return; }
    H.D = Math.max(Math.round((H.D + X) / 2 / 100) * 100, Math.round(c.M * 1.02 / 100) * 100);
    haggleSay('counter');
  }
  updateDebug();
}

function acceptDemand() {
  const c = S.customers[S.custIdx], H = S.haggle;
  if (!H || H.D > S.gold) return;
  sndClick();
  closeDeal(c, H.D, 'acceptEasy');
}

// 거래 성사: price에 매입. 진짜 가치는 저녁 정산에서 공개된다.
function closeDeal(c, price, tone) {
  S.haggle = null;
  S.stats.deals++;
  S.regularDeals[c.ctype.type] = (S.regularDeals[c.ctype.type] || 0) + 1; // 단골 카운트
  S.gold -= price;
  S.stats.buyRatioSum += price / c.V;
  S.purchases.push({ item: c.item, V: c.V, price, jackpot: c.jackpot, stolen: c.stolen });
  updateHUD();
  sndGood();
  const cheap = price <= c.asking * 0.6;
  showModal(`
    <h2 class="good">🤝 거래 성사!</h2>
    <div class="speech">${pick(HAGGLE_LINES[tone])}</div>
    <p>${c.item.emoji} ${c.item.name}을(를) <b class="accent">${fmt(price)} G</b>에 매입했다${cheap ? ' — 요구가를 크게 후려쳤다!' : ''}</p>
    <p class="dim" style="font-size:13px">진짜 가치는 <b>저녁 정산</b>에서 판명된다. ${c.stolen ? '' : '두근두근...'}</p>
    ${S.regularDeals[c.ctype.type] === CONFIG.REGULAR_DEALS_REQ ? `<p class="accent">⭐ ${c.ctype.type} 사이에 좋은 소문이 났다 — 이제 단골이다! (최저 수락가 −5%p)</p>` : ''}
    <div class="center"><button onclick="nextCustomer()">다음 →</button></div>`);
}

// 흥정 결렬: 손님이 박차고 나간다 — 진상은 여기서 공개 (실패에서 배운다)
function walkOut(c, lastX) {
  S.haggle = null;
  S.stats.rejected++;
  sndBad();
  showModal(`
    <h2 class="bad">💢 흥정 결렬!</h2>
    <div class="speech">"${c.ctype.angry}"</div>
    <p>${c.name}(${c.ctype.type})이(가) 물건을 챙겨 박차고 나갔다.</p>
    <table style="margin:10px 0">
      <tr><td>내 마지막 제시가</td><td>${fmt(lastX)} G</td></tr>
      <tr><td>손님의 최저 수락가</td><td class="bad">${fmt(c.M)} G</td></tr>
      <tr><td>진짜 가치</td><td class="accent">${fmt(c.V)} G${c.jackpot ? ' (사실은 숨은 진품이었다...!)' : ''}</td></tr>
    </table>
    ${c.stolen ? '<p class="dim">💡 사실 이 물건은 장물이었다 — 안 산 게 다행일지도.</p>' : ''}
    ${c.hasTrap ? `<p class="dim">💡 힌트 중 하나는 함정이었다: "${c.hints.find(h => h.trap).text}"</p>` : ''}
    <div class="center"><button onclick="nextCustomer()">다음 →</button></div>`);
}

function passCustomer() {
  sndClick();
  const c = S.customers[S.custIdx];
  showModal(`
    <h2>🚪 매입 포기</h2>
    <p>${c.name}이(가) 물건을 도로 챙겨 떠났다.</p>
    <p class="dim">진짜 가치는 ${fmt(c.V)} G였다.</p>
    <div class="center"><button onclick="nextCustomer()">다음 →</button></div>`);

function nextCustomer() {
  hideModal();
  S.custIdx++;
  if (S.custIdx < S.customers.length) renderCustomer();
  else startEvening();
}

/* ═══════════════════════════════════════════════════════════════
   저녁 — 정산
   ═══════════════════════════════════════════════════════════════ */
function startEvening() {
  S.phase = 'evening'; setTheme('evening'); updateHUD();

}

function renderEvening() {
  S.timeLabel = '오후 6:30';
  updateHUD();
  let total = 0;
  const mul = (S.event && S.event.resaleMul) || 1; // 호황/불황 이벤트 반영
  const rows = S.purchases.map(p => {
    // 🚨 장물: 매입한 게 장물이면 경찰에 압수될 수 있다 (매입가 전액 손실)
    if (p.stolen && Math.random() < CONFIG.STOLEN_CONFISCATE) {
      S.stats.stolenLost++;
      S.stats.tradePL -= p.price;
      total -= p.price;
      return `<tr>
        <td>🚨 ${p.item.emoji} ${p.item.name}</td>
        <td>-${fmt(p.price)}</td><td class="bad">경찰 압수!</td>
        <td class="bad">-${fmt(p.price)}</td>
      </tr>`;
    }

    let saleV = Math.round(p.V * mul);
    let tag = p.stolen ? ' <span class="dim">(장물이었지만 무사통과)</span>' : '';
    if (p.jackpot) {

      S.stats.jackpots++;
    }
    const profit = saleV - p.price;
    S.gold += saleV;
    S.stats.tradePL += profit;
    S.stats.bestDeal = Math.max(S.stats.bestDeal, profit);

      <td>${p.item.emoji} ${p.item.name}${tag}</td>
      <td>-${fmt(p.price)}</td><td>+${fmt(saleV)}</td>

      ${rows ? `<table>
        <tr><th>매입 물건</th><th>매입가</th><th>되팔이</th><th>손익</th></tr>${rows}
      </table>` : '<p class="dim">오늘 매입한 물건이 없다. 정산할 것도 없다.</p>'}
      <p class="big" style="margin-top:12px">오늘 장사 손익:
        <span class="${total >= 0 ? 'good' : 'bad'}">${total >= 0 ? '+' : ''}${fmt(total)} G</span></p>
      <p>현재 자산: <span class="accent big">${fmt(S.gold)} G</span></p>
      <div class="center" style="margin-top:14px">
        <button class="btn-big" onclick="startNight()">🌙 지하 격투장으로 내려간다</button>
      </div>
    </div>`;
  updateDebug();
}

/* ═══════════════════════════════════════════════════════════════
   밤 루프 — 지하 격투장 베팅
   ═══════════════════════════════════════════════════════════════ */
function startNight() {
  sndClick();
  S.phase = 'night'; S.matchIdx = 0; S.timeLabel = '오후 11:30';
  S.matches = genMatches((S.event && S.event.nightMatches) || CONFIG.MATCHES_PER_NIGHT);
  setTheme('night'); updateHUD();
  const evLine = S.event && (S.event.nightMatches || S.event.betCap)
    ? `<div style="font-size:15px; color:#ff44aa; margin-top:4px">${S.event.name} — ${S.event.desc}</div>` : '';
  showTransition('<div>🌙</div><div class="blink" style="color:#ff44aa">지하 격투장</div><div style="font-size:16px;opacity:0.7">쇠 냄새와 함성이 뒤섞인 계단을 내려간다...</div>' + evLine, renderMatch, 1400);
}

function winRate(f) { return (f.w + f.l) === 0 ? 0.5 : f.w / (f.w + f.l); }
// 링 이펙트 헬퍼 (경기 연출·직접 출전 공용)
function arenaFx(side, emoji) {
  const el = $('arena'); if (!el) return;
  const fx = document.createElement('span');
  fx.className = 'fx-pop'; fx.textContent = emoji;
  fx.style[side === 'A' ? 'left' : 'right'] = '16%';
  el.appendChild(fx);
  setTimeout(() => fx.remove(), 600);
}
function arenaFloat(side, text, cls) {
  const el = $('arena'); if (!el) return;
  const fl = document.createElement('span');
  fl.className = 'dmg-float' + (cls ? ' ' + cls : ''); fl.textContent = text;
  fl.style[side === 'A' ? 'left' : 'right'] = '20%';
  el.appendChild(fl);
  setTimeout(() => fl.remove(), 800);
}
function betCapRate() {
  const m = S.matches && S.matches[S.matchIdx];
  if (m && m.final) return 1; // 👑 그랜드 파이널: 베팅 상한 해제
  return (S.event && S.event.betCap) || CONFIG.BET_MAX_RATE;
}
function partBonusMul() { return 1 + Math.min(S.stats.drops, CONFIG.PART_BONUS_CAP) * CONFIG.PART_PAYOUT_BONUS; }

function genMatches(count) {
  const order = shuffle(S.fighters.map((_, i) => i));
  const matches = [];
  const makeMatch = (ia, ib) => {
    const A = S.fighters[ia], B = S.fighters[ib];
    const sumA = A.atk + A.def + A.spd, sumB = B.atk + B.def + B.spd;
    // 하우스 추정 = 스탯 비율 + 전적 보정 (최대 ±10%p) — 소문은 모른다
    let est = sumA / (sumA + sumB) + (winRate(A) - winRate(B)) * CONFIG.RECORD_ADJ_MAX;
    est = clamp(est, CONFIG.HOUSE_EST_MIN, CONFIG.HOUSE_EST_MAX);
    const oddsA = (1 / est) * (1 - CONFIG.HOUSE_MARGIN);
    const oddsB = (1 / (1 - est)) * (1 - CONFIG.HOUSE_MARGIN);
    // 컨디션 소문 — 실제 승률에만 반영 (하우스는 모른다).
    // 실제 정황(테마)이 있으면 그 테마의 소문 1~2개가 진짜로 돌고, 헛소문은 다른 테마에서 섞인다.
    const fakeFrom = (theme) => {
      const weakPool = theme.rumors.filter(r => r.strength === 'weak');
      const src = (weakPool.length && Math.random() < CONFIG.RUMOR_FAKE_WEAK_BIAS) ? pick(weakPool) : pick(theme.rumors);
      return { text: src.text, strength: src.strength, icon: theme.icon, themeId: theme.id, sign: theme.sign, fake: true, effect: 0 };
    };
    const genRumors = () => {
      const out = [];
      if (Math.random() < CONFIG.RUMOR_COND_RATE) {
        // 실제 정황이 있다: 진짜 소문 1~2개 (같은 테마 = 상호 검증 가능)
        const theme = pick(RUMOR_THEMES);
        const nTrue = Math.random() < CONFIG.RUMOR_SECOND_TRUE ? 2 : 1;
        const picked = shuffle(theme.rumors).slice(0, nTrue);
        const mag = rand(theme.mag[0], theme.mag[1]) + (picked.length - 1) * CONFIG.RUMOR_CORROBORATION_BONUS;
        picked.forEach(src => out.push({
          text: src.text, strength: src.strength, icon: theme.icon, themeId: theme.id,
          sign: theme.sign, fake: false, effect: theme.sign * mag / picked.length,
        }));
        if (Math.random() < CONFIG.RUMOR_EXTRA_FAKE) {
          out.push(fakeFrom(pick(RUMOR_THEMES.filter(t => t.id !== theme.id))));
        }
      } else {
        // 정황 없음: 헛소문만 0~N개 (서로 모순될 수도 — 그것도 단서다)
        shuffle(RUMOR_THEMES).slice(0, randInt(0, CONFIG.RUMOR_NOISE_MAX)).forEach(t => out.push(fakeFrom(t)));
      }
      return shuffle(out);
    };
    const rumorsA = genRumors(), rumorsB = genRumors();
    // 🕵️ 정보원: 경기당 소문 하나의 진위를 알려준다
    if (S.upgrades.informant) {
      const all = rumorsA.concat(rumorsB);
      if (all.length) pick(all).verified = true;
    }
    // 🤝 후원 계약: 후원 파이터의 소문은 전부 진위가 확인된다 (컨디션 직보)
    if (S.sponsorIdx === ia) rumorsA.forEach(r => { r.verified = true; });
    if (S.sponsorIdx === ib) rumorsB.forEach(r => { r.verified = true; });
    const effA = rumorsA.reduce((s, r) => s + r.effect, 0);
    const effB = rumorsB.reduce((s, r) => s + r.effect, 0);
    const pActual = clamp(est + effA - effB, CONFIG.WINPROB_MIN, CONFIG.WINPROB_MAX);
    return { ia, ib, est, oddsA, oddsB, rumorsA, rumorsB, pActual, done: false };
  };
  for (let m = 0; m < count; m++) {
    matches.push(makeMatch(order[m * 2], order[m * 2 + 1]));
  }
  // 👑 마지막 날 밤: 마지막 경기는 그랜드 파이널 — 랭킹(승률) 1·2위 격돌, 베팅 상한 해제
  if (S.day >= CONFIG.DAYS && matches.length) {
    const ranked = S.fighters.map((_, i) => i)
      .sort((x, y) => winRate(S.fighters[y]) - winRate(S.fighters[x]) || S.fighters[y].w - S.fighters[x].w);
    matches[matches.length - 1] = { ...makeMatch(ranked[0], ranked[1]), final: true };
  }
  return matches;
}

function statBar(v) { return '█'.repeat(v) + '░'.repeat(10 - v); }

function fighterCardHTML(f, m, side) {
  const rumors = side === 'A' ? m.rumorsA : m.rumorsB;
  const odds = side === 'A' ? m.oddsA : m.oddsB;
  const idx = side === 'A' ? m.ia : m.ib;
  const sponsored = S.sponsorIdx === idx;
  return `
    <div class="fighter-card" id="fcard-${side}" onclick="selectFighter('${side}')">
      <div class="row" style="gap:8px; align-items:center; flex-wrap:nowrap">
        <span class="pframe" style="width:64px; height:64px; font-size:40px">${f.emoji}</span>
        <div>
          <h3 style="font-size:15px">파이터 ${side}${sponsored ? ' <span class="accent" style="font-size:12px">🤝 후원 중</span>' : ''}</h3>
          <p style="font-size:14px">${f.name}</p>
          <p class="dim" style="font-size:12px">전적 <span class="${winRate(f) >= 0.5 ? 'good' : 'bad'}">${f.w}승 ${f.l}패</span></p>
        </div>
      </div>
      <p style="font-size:13px; margin-top:6px">공격력 <span class="statbar">${statBar(f.atk)}</span> ${f.atk}<br>
         방어력 <span class="statbar">${statBar(f.def)}</span> ${f.def}<br>
         스피드 <span class="statbar">${statBar(f.spd)}</span> ${f.spd}</p>
      <p class="center big neon-pink" style="margin-top:4px">배당 ×${odds.toFixed(2)}</p>
      ${rumors.length ? rumors.map(r => `
        <div class="bubble" style="margin-top:8px; font-size:13px"><span class="rumor-icon">${r.icon}</span> ${r.text}
          ${r.verified
            ? `<div class="trust ${r.fake ? 'low' : 'high'}">🕵️ 정보원 확인: <b>${r.fake ? '헛소문이다!' : '진짜다!'}</b></div>`
            : `<div class="trust ${r.strength === 'strong' ? 'high' : 'low'}">(${r.strength === 'strong' ? '직접 목격 — 신뢰도 높음' : '뜬소문 — 신뢰도 낮음'})</div>`}
        </div>`).join('') : '<p class="dim center" style="margin-top:8px; font-size:13px">별다른 소문이 없다.</p>'}
    </div>`;
}

function renderMatch() {
  updateHUD();
  const m = S.matches[S.matchIdx];
  const A = S.fighters[m.ia], B = S.fighters[m.ib];
  S.currentBet = null;
  const maxBet = Math.floor(S.gold * betCapRate());
  const pMul = partBonusMul();
  $('screen').innerHTML = `
    <div class="scene scene-night">
      <div class="crowd"></div>
      <div class="neon neon-l"></div><div class="neon neon-r"></div>
      <div class="hp-row">
        <span style="font-size:13px">HP</span>
        <div class="hpbar-wrap"><div class="hpbar cyan" id="hp-A" style="width:100%"></div></div>
        <span class="neon-pink" style="font-size:15px; white-space:nowrap">${m.final ? '👑 그랜드 파이널' : `제${S.matchIdx + 1}경기/${S.matches.length}`}</span>
        <div class="hpbar-wrap"><div class="hpbar" id="hp-B" style="width:100%"></div></div>
        <span style="font-size:13px">HP</span>
      </div>
      <div class="night-grid">
        ${fighterCardHTML(A, m, 'A')}
        <div class="ring" id="arena">
          <div class="ring-ropes"><i></i><i></i><i></i></div>
          <div class="ring-floor"></div>
          ${rigHTML('A', A.color, 'idle')}
          ${rigHTML('B', B.color, 'idle')}
        </div>
        ${fighterCardHTML(B, m, 'B')}
      </div>
      <div class="panel" id="night-console" style="margin-bottom:0">

          <span class="dim" style="font-size:12px"> — 배당은 스탯·전적만 반영. 소문은 당신만 아는 정보다.</span></p>
        <p class="center dim" style="font-size:12px">🕵️ 추리법: 같은 표시(🩹🍶🌫️🔥⚡🎯)의 소문이 <b>겹치면 사실</b>일 확률이 높고, 좋은/나쁜 소문이 <b>충돌하면 최소 하나는 거짓</b>이다. 목격담(높음)이 뜬소문(낮음)보다 믿을 만하다.</p>
        <div class="row" style="align-items:center; margin-top:8px">
          <span id="bet-pick" class="dim" style="font-size:14px">파이터 패널을 눌러 선택 →</span>
          <span style="flex:1"></span>
          <input type="number" id="bet-amount" min="0" max="${maxBet}" step="100" value="${Math.min(1000, maxBet)}">
          <span>G</span>
          <button class="btn-ghost" onclick="setBet(0.1)">10%</button>
          <button class="btn-ghost" onclick="setBet(0.25)">25%</button>
          <button class="btn-ghost" onclick="setBet(0.5)">50%</button>
        </div>
        ${m.final ? '<p class="center neon-pink" style="font-size:13px">👑 그랜드 파이널의 밤 — 오늘만은 베팅 상한이 없다. 전부를 걸어도 좋다.</p>' : ''}
        <p class="dim" style="font-size:12px">베팅 상한: 보유 골드의 ${Math.round(betCapRate() * 100)}% = ${fmt(maxBet)} G${pMul > 1 ? ` · ✦ 부품 인맥 보너스: 당첨금 +${Math.round((pMul - 1) * 100)}%` : ''}</p>
        <div class="center" style="margin-top:6px">
          <button class="btn-big btn-pink" id="btn-bet" onclick="confirmBet()" disabled>베팅 확정</button>
          <button class="btn-ghost" onclick="watchOnly()">관망한다 (베팅 없이 관전)</button>
        </div>
      </div>
    </div>`;
  updateDebug();
}

function selectFighter(side) {
  sndClick();
  const m = S.matches[S.matchIdx];
  S.currentBet = { side };
  document.querySelectorAll('.fighter-card').forEach(el => el.classList.remove('selected'));
  $('fcard-' + side).classList.add('selected');
  const f = S.fighters[side === 'A' ? m.ia : m.ib];
  const odds = side === 'A' ? m.oddsA : m.oddsB;
  $('bet-pick').innerHTML = `선택: <b class="accent">${f.emoji} ${f.name}</b> (배당 ×${odds.toFixed(2)})`;
  $('btn-bet').disabled = false;
}

function setBet(rate) {
  sndClick();
  $('bet-amount').value = Math.floor(S.gold * Math.min(rate, betCapRate()) / 100) * 100;
}

function confirmBet() {
  const m = S.matches[S.matchIdx];
  if (!S.currentBet) return;
  const maxBet = Math.floor(S.gold * betCapRate());
  const amt = clamp(Math.round(+($('bet-amount').value) || 0), 0, maxBet);
  if (amt <= 0) { $('bet-pick').innerHTML = '<span class="bad">베팅액을 입력하라.</span>'; return; }
  sndClick();
  S.currentBet.amount = amt;
  S.gold -= amt;
  updateHUD();
  runFight();
}

function watchOnly() { sndClick(); S.currentBet = null; runFight(); }

function runFight() {
  const m = S.matches[S.matchIdx];
  const A = S.fighters[m.ia], B = S.fighters[m.ib];
  // 승자는 실제 승률(소문 반영)로 결정
  const aWins = Math.random() < m.pActual;
  const W = aWins ? A : B, L = aWins ? B : A;
  m.winner = aWins ? 'A' : 'B'; m.done = true;
  W.w++; L.l++;

  // ── 경기 아크: 압승/접전/역전극 — 승자는 이미 확률로 정해졌고, 그 과정을 연출한다 ──
  const sideW = aWins ? 'A' : 'B', sideL = aWins ? 'B' : 'A';
  const arc = pickWeighted([{ id: 'dominant', w: 3 }, { id: 'close', w: 4 }, { id: 'comeback', w: 3 }]).id;
  const nEx = randInt(4, 6); // 공방 교환 횟수 (경기 길이)
  const wEnd = arc === 'dominant' ? randInt(55, 85) : arc === 'close' ? randInt(8, 25) : randInt(10, 20);
  // HP 웨이포인트 곡선: 역전극은 승자가 초반에 두들겨 맞고(p<1), 패자는 후반에 무너진다(p>1)
  const curve = (to, p) => {
    const pts = [100];
    for (let i = 1; i <= nEx; i++) {
      const v = 100 - (100 - to) * Math.pow(i / nEx, p) + rand(-7, 7);
      pts.push(Math.min(pts[i - 1], Math.max(to, Math.round(v))));
    }
    pts[nEx] = to;
    return pts;
  };
  const loserPts = curve(randInt(5, 10), arc === 'comeback' ? 2.4 : 1); // KO 피니시용으로 5~10 남김
  const winnerPts = curve(wEnd, arc === 'comeback' ? 0.45 : 1);

  const mkLine = (pool, a, b) => pick(pool).replaceAll('{a}', a.name).replaceAll('{b}', b.name);
  const first = A.spd >= B.spd ? A : B;
  // 각성 소재: 승자 측의 '진짜 호재 소문' — 있으면 역전극이 각성 연출이 된다
  const awakenRumor = (aWins ? m.rumorsA : m.rumorsB).find(r => !r.fake && r.sign > 0);
  const steps = [];
  let hw = 100, hl = 100;
  const hpOf = () => sideW === 'A' ? { hpA: hw, hpB: hl } : { hpA: hl, hpB: hw };
  steps.push({ line: `🔔 공이 울린다! ${first.name}(이)가 잽을 던지며 거리를 잰다!`, hpA: 100, hpB: 100 });
  for (let i = 1; i <= nEx; i++) {
    // 역전극 전반부에는 패자(초반 우세 쪽)가 먼저 친다
    const order = (arc === 'comeback' && i <= Math.ceil(nEx / 2)) ? ['L', 'W'] : ['W', 'L'];
    for (const who of order) {
      const att = who === 'W' ? W : L, def = who === 'W' ? L : W;
      const attSide = who === 'W' ? sideW : sideL, defSide = who === 'W' ? sideL : sideW;
      const target = who === 'W' ? loserPts[i] : winnerPts[i];
      const dmg = (who === 'W' ? hl : hw) - target;
      if (who === 'W') hl = target; else hw = target;
      if (dmg <= 0) {
        steps.push({ type: 'dodge', att: attSide, def: defSide, line: mkLine(FIGHT_DODGE_LINES, att, def), ...hpOf() });
      } else {
        const heavy = dmg >= 20;
        const mv = pick(heavy ? HEAVY_MOVES : LIGHT_MOVES);
        steps.push({ type: 'attack', att: attSide, def: defSide, dmg, heavy, mv,
          line: mkLine(mv.lines, att, def), ...hpOf() });
      }
    }
    // 중반 드라마: 접전은 관중 함성, 역전극은 각성(진짜 소문 인용) 또는 투혼
    if (i === Math.ceil(nEx / 2)) {
      if (arc === 'close') steps.push({ line: pick(FIGHT_CROWD_LINES), ...hpOf() });
      if (arc === 'comeback') {
        if (awakenRumor) {
          steps.push({ type: 'awaken', side: sideW,
            line: `⚡ 쓰러지기 직전—— "${awakenRumor.text}"... 그 소문, 진짜였다!! ${W.name}의 몸에서 불꽃이 튄다!!`, ...hpOf() });
        } else {
          steps.push({ line: pick(FIGHT_COMEBACK_LINES).replaceAll('{a}', W.name), ...hpOf() });
        }
      }
    }
  }
  // 피니시: 필살기 KO
  const lastDmg = hl;
  hl = 0;
  steps.push({ type: 'attack', att: sideW, def: sideL, dmg: lastDmg, heavy: true, ko: true, mv: pick(HEAVY_MOVES),
    line: `💥 ${W.name}의 필살기 '${W.skill}' 작렬!! ${L.name}, 그대로 쓰러진다!`, ...hpOf() });
  steps.push({ type: 'win', win: sideW,
    line: `🏆 ${W.emoji} ${W.name} 승리!${arc === 'comeback' ? (awakenRumor ? ' 소문은 사실이었다 — 대각성 역전극!!' : ' 대역전극이다!!') : arc === 'close' ? ' 명승부였다!' : ''}`, ...hpOf() });

  // 콘솔을 중계 로그로 전환 — 링·HP바·파이터 패널은 씬에 그대로 남는다
  $('night-console').innerHTML = `
    <div class="fightlog" id="fightlog"></div>
    <div class="center" id="fight-after" style="margin-top:8px"></div>`;
  $('sprite-A').className = 'sprite-pos';
  $('sprite-B').className = 'sprite-pos';
  updateDebug();

  const log = $('fightlog');
  let idx = 0;
  const tick = () => {
    if (idx >= steps.length) { settleFight(m, aWins); return; }
    const st = steps[idx++];
    const div = document.createElement('div');
    div.textContent = '▸ ' + st.line;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    $('hp-A').style.width = st.hpA + '%';
    $('hp-B').style.width = st.hpB + '%';
    playFightStep(st);
    setTimeout(tick, st.type === 'awaken' ? 1250 : 700);
  };
  tick();
}

// 스텝 하나를 링 위에서 연기한다 (경기·직접 출전 공용)
function playFightStep(st) {
  if (st.type === 'attack') {
    const outA = $('sprite-' + st.att), outD = $('sprite-' + st.def);
    const rigA = rigOf(st.att);
    outA.classList.remove('idle'); outD.classList.remove('idle');
    outA.classList.add(st.mv.fly ? 'go-fly' : 'go');
    rigA.classList.add(st.mv.act);
    setTimeout(() => {
      outD.classList.add(st.mv.rx);
      arenaFx(st.def, st.mv.fx);
      arenaFloat(st.def, '-' + st.dmg, st.heavy ? 'crit' : '');
      beep(st.heavy ? 150 : rand(190, 260), st.heavy ? 0.12 : 0.06);
      if (st.ko) {
        setTimeout(() => { outD.className = 'sprite-pos ko'; arenaFx(st.def, '💫'); }, 380);
      }
    }, 200);
    setTimeout(() => { rigA.classList.remove(st.mv.act); outA.classList.remove('go', 'go-fly'); }, 520);
    if (!st.ko) setTimeout(() => outD.classList.remove(st.mv.rx), 640);
  } else if (st.type === 'dodge') {
    const outA = $('sprite-' + st.att), outD = $('sprite-' + st.def);
    const rigA = rigOf(st.att);
    outA.classList.add('go'); rigA.classList.add('act-punch');
    setTimeout(() => {
      outD.classList.add('dodge');
      arenaFx(st.def, '💨');
      arenaFloat(st.def, 'MISS!', 'miss');
      setTimeout(() => outD.classList.remove('dodge'), 380);
      beep(520, 0.05);
    }, 160);
    setTimeout(() => { rigA.classList.remove('act-punch'); outA.classList.remove('go'); }, 460);
  } else if (st.type === 'awaken') {
    const out = $('sprite-' + st.side);
    out.classList.add('awaken');
    arenaFx(st.side, '✨');
    setTimeout(() => arenaFx(st.side, '⚡'), 300);
    setTimeout(() => arenaFx(st.side, '✨'), 600);
    sndDrop();
    setTimeout(() => out.classList.remove('awaken'), 1900);
  } else if (st.type === 'win') {
    $('sprite-' + st.win).classList.add('win-pose');
    sndGood();
  } else {
    beep(rand(300, 420), 0.05);
  }
}

function settleFight(m, aWins) {
  const A = S.fighters[m.ia], B = S.fighters[m.ib];
  const W = aWins ? A : B;
  let html = '';
  // 🤝 후원 지분: 후원 파이터가 이기면 베팅과 무관하게 수익
  if (S.sponsorIdx === (aWins ? m.ia : m.ib)) {
    S.gold += CONFIG.SPONSOR_WIN_CUT;
    S.stats.sponsorIncome += CONFIG.SPONSOR_WIN_CUT;
    html += `<p class="accent">🤝 후원 파이터 ${W.name} 승리! 지분 수익 +${fmt(CONFIG.SPONSOR_WIN_CUT)} G</p>`;
  }
  if (S.currentBet) {
    const bet = S.currentBet;
    const betOnA = bet.side === 'A';
    const won = betOnA === aWins;
    const odds = betOnA ? m.oddsA : m.oddsB;
    const estChosen = betOnA ? m.est : 1 - m.est;
    S.stats.bets++;
    S.stats.houseEstSum += estChosen;
    if (won) {
      const pMul = partBonusMul();
      const payout = Math.floor(bet.amount * odds * pMul);
      S.gold += payout;
      const pl = payout - bet.amount;
      S.stats.betWins++; S.stats.betPL += pl;
      sndGood();
      html += `<p class="good big">🎉 적중! +${fmt(payout)} G (순익 +${fmt(pl)} G)</p>`;
      if (pMul > 1) html += `<p class="dim" style="font-size:13px">✦ 부품 인맥 보너스 +${Math.round((pMul - 1) * 100)}% 포함</p>`;
      // 희귀 드롭: 언더독 적중일수록 확률 상승
      const dropP = CONFIG.DROP_BASE * (1 + (1 - estChosen) * CONFIG.DROP_UNDERDOG_COEF);
      if (Math.random() < dropP) {
        S.stats.drops++;
        sndDrop();
        html += `<p class="drop-fx blink">✦ 전설 부품 획득! (보유 ${S.stats.drops}개)</p>
                 <p class="dim">쓰러진 파이터의 주머니에서 굴러 나왔다... (드롭률 ${(dropP * 100).toFixed(1)}%)</p>`;
      }
    } else {
      S.stats.betPL -= bet.amount;
      sndBad();
      html += `<p class="bad big">💸 빗나갔다... -${fmt(bet.amount)} G</p>`;
    }
  } else {
    html += `<p class="dim">관망했다. 잃은 것도, 얻은 것도 없다.</p>`;
  }
  // 헛소문 공개 (학습 피드백)
  const fakes = [...m.rumorsA, ...m.rumorsB].filter(r => r.fake);
  if (fakes.length) {
    html += `<p class="dim" style="margin-top:6px">💡 헛소문이었다: ${fakes.map(r => `"${r.text}"`).join(' / ')}</p>`;
  }
  updateHUD();
  const isLast = S.matchIdx >= S.matches.length - 1;
  $('fight-after').innerHTML = html + `
    <button class="btn-big" onclick="nextMatch()">${isLast ? '🌃 밤을 마감한다' : '다음 경기 →'}</button>`;
}

function nextMatch() {
  sndClick();
  S.matchIdx++;
  if (S.matchIdx < S.matches.length) { renderMatch(); }
  else { renderChallengeOffer(); }
}

/* ═══════════════════════════════════════════════════════════════
   직접 출전 — 스파링 도전 (삼각 심리전: 러시 > 견제 > 카운터 > 러시)
   상대의 예비 동작(텔)을 읽어라. 단, 일부는 페인트다.

function proceedAfterChallenge() {
  sndClick();
  S.challenge = null;
  if (S.day >= CONFIG.DAYS) renderResult();
  else renderDawnShop();
}

  $('btn-chal').disabled = false;
}

function rollOppMove(O) {
  return pickWeighted([
    { id: 'rush', w: O.atk }, { id: 'poke', w: O.spd }, { id: 'counter', w: O.def },
  ]).id;
}

function startChallenge() {
  if (S.challengePick === null) return;
  const maxStake = Math.floor(S.gold * CONFIG.CHALLENGE_STAKE_RATE / 100) * 100;
  const stake = clamp(Math.round(+($('chal-stake').value) || 0), CONFIG.CHALLENGE_STAKE_MIN, maxStake);
  if (stake > S.gold) return;
  sndClick();
  S.gold -= stake;
  S.challenge = { oppIdx: S.challengePick, stake, php: 100, ohp: 100, round: 1, log: [] };
  updateHUD();
  renderChallengeRound();
}

function renderChallengeRound() {
  const C = S.challenge, O = S.fighters[C.oppIdx], P = S.player;
  // 이번 라운드 상대 수 결정 + 텔 생성 (일부는 페인트)
  C.oppMove = rollOppMove(O);
  C.tellTruth = Math.random() < CONFIG.TELL_TRUTH;
  // 페인트는 함정: 보이는 수를 그대로 믿고 카운터치면 정확히 지는 수를 보여준다
  const shown = C.tellTruth ? C.oppMove : BEAT_OF[C.oppMove];
  C.tell = pick(TELLS[shown]);
  $('screen').innerHTML = `
    <div class="scene scene-night">
      <div class="crowd"></div>
      <div class="neon neon-l"></div><div class="neon neon-r"></div>
      <div style="position:relative; z-index:2">
        <div class="hp-row">
          <span style="font-size:13px">${P.emoji} 나</span>
          <div class="hpbar-wrap"><div class="hpbar cyan" id="hp-A" style="width:${C.php}%"></div></div>
          <span class="neon-pink" style="font-size:15px; white-space:nowrap">R${C.round}</span>
          <div class="hpbar-wrap"><div class="hpbar" id="hp-B" style="width:${C.ohp}%"></div></div>
          <span style="font-size:13px">${O.emoji}</span>
        </div>
        <div class="ring" id="arena">
          <div class="ring-ropes"><i></i><i></i><i></i></div>
          <div class="ring-floor"></div>
          ${rigHTML('A', PLAYER_COLOR, 'idle')}
          ${rigHTML('B', O.color, 'idle')}
        </div>
        <div class="panel" id="night-console" style="margin-bottom:0">
          <div class="tell-box">👁️ ${O.name}의 움직임 — ${C.tell}</div>
          ${C.log.length ? `<p class="dim" style="font-size:13px">${C.log[C.log.length - 1]}</p>` : ''}
          <div class="center" style="margin-top:8px" id="move-btns">
            <button class="move-btn" onclick="playerMove('rush')">👊 러시<small>견제를 이긴다</small></button>
            <button class="move-btn" onclick="playerMove('poke')">🦶 견제<small>카운터를 이긴다</small></button>
            <button class="move-btn" onclick="playerMove('counter')">🛡️ 카운터<small>러시를 이긴다</small></button>
          </div>
        </div>
      </div>
    </div>`;
  updateDebug();
}

function playerMove(mv) {
  const C = S.challenge; if (!C || C.resolving || C.php <= 0 || C.ohp <= 0) return;
  C.resolving = true;
  sndClick();
  const O = S.fighters[C.oppIdx], P = S.player;
  const om = C.oppMove;
  const dmgOf = (att, dfn) => clamp(18 + att.atk * 2 - dfn.def, 12, 34);
  // 심리전 수 → 실제 격투 기술 매핑 (강타 여부에 따라 도약기로 승격)
  const toFightMove = (key, big) => {
    const map = { rush: big ? 'flypunch' : 'punch', poke: big ? 'flykick' : 'kick', counter: 'throw' };
    return FIGHT_MOVES.find(f => f.id === map[key]);
  };
  let line;
  document.querySelectorAll('#move-btns button').forEach(b => b.disabled = true);
  if (mv === om) {
    // 동수 — 서로 정면으로 부딪히며 잔타 교환
    const d = randInt(6, 12);
    C.php = Math.max(0, C.php - d); C.ohp = Math.max(0, C.ohp - d);
    line = `⚔️ 둘 다 ${MOVES[mv].name}! 정면으로 부딪히며 서로 잔타를 주고받는다 (-${d} / -${d})`;
    playFightStep({ type: 'attack', att: 'A', def: 'B', dmg: d, heavy: false, mv: toFightMove(mv, false) });
    setTimeout(() => playFightStep({ type: 'attack', att: 'B', def: 'A', dmg: d, heavy: false, mv: toFightMove(om, false) }), 240);
  } else if (MOVES[mv].beats === om) {
    // 내가 이김
    const d = dmgOf(P, O);
    C.ohp = Math.max(0, C.ohp - d);
    line = `✅ ${MOVES[mv].name}(으)로 상대의 ${MOVES[om].name}을(를) 꺾었다! ${O.name}에게 ${d} 데미지!`;
    playFightStep({ type: 'attack', att: 'A', def: 'B', dmg: d, heavy: d >= 26, mv: toFightMove(mv, d >= 26), ko: C.ohp <= 0 });
  } else {
    // 상대가 이김
    const d = dmgOf(O, P);
    C.php = Math.max(0, C.php - d);
    line = `❌ 상대의 ${MOVES[om].name}에 당했다! ${C.tellTruth ? '' : '(예비 동작은 페인트였다!) '}${d} 데미지를 입었다...`;
    playFightStep({ type: 'attack', att: 'B', def: 'A', dmg: d, heavy: d >= 26, mv: toFightMove(om, d >= 26), ko: C.php <= 0 });
  }
  C.log.push(line);
  // HP바 반영
  setTimeout(() => {
    $('hp-A').style.width = C.php + '%';
    $('hp-B').style.width = C.ohp + '%';
  }, 300);
  setTimeout(() => {
    C.resolving = false;
    if (C.php <= 0 || C.ohp <= 0) finishChallenge(C.ohp <= 0 && C.php > 0);
    else { C.round++; renderChallengeRound(); }
  }, 1150);
}

function finishChallenge(win) {
  const C = S.challenge, O = S.fighters[C.oppIdx], P = S.player;
  S.stats.playerFights++;
  let html = '';
  if (win) {
    const payout = C.stake * CONFIG.CHALLENGE_PAYOUT;
    S.gold += payout;
    S.stats.playerWins++;
    S.stats.challengePL += payout - C.stake;
    P.w++; O.l++;
    $('sprite-B') && $('sprite-B').classList.add('ko');
    $('sprite-A') && $('sprite-A').classList.add('win-pose');
    sndGood();
    html = `<p class="good big">🏆 승리! ${O.name}을(를) 쓰러뜨렸다! 판돈 ×${CONFIG.CHALLENGE_PAYOUT} = +${fmt(payout)} G</p>`;
    // 성장: 랜덤 스탯 +1
    const grow = shuffle(['atk', 'def', 'spd']).find(k => P[k] < CONFIG.PLAYER_GROWTH_CAP);
    if (grow) {
      P[grow]++;
      html += `<p class="accent">💪 실전으로 몸이 단련됐다 — ${grow === 'atk' ? '공격력' : grow === 'def' ? '방어력' : '스피드'} +1 (현재 ${P[grow]})</p>`;
    }
    if (Math.random() < CONFIG.CHALLENGE_DROP) {
      S.stats.drops++;
      sndDrop();
      html += `<p class="drop-fx blink">✦ 전설 부품 획득! (보유 ${S.stats.drops}개)</p>`;
    }
  } else {
    S.stats.challengePL -= C.stake;
    P.l++; O.w++;
    $('sprite-A') && $('sprite-A').classList.add('ko');
    $('sprite-B') && $('sprite-B').classList.add('win-pose');
    sndBad();
    html = `<p class="bad big">💥 패배... 판돈 ${fmt(C.stake)} G를 잃고 흠씬 두들겨 맞았다.</p>
      <p class="dim" style="font-size:13px">데스크: "몸은 성하지? 내일 또 오라고."</p>`;
  }
  updateHUD();
  $('night-console').innerHTML = `
    <div style="font-size:14px; line-height:1.8">${html}</div>
    <div class="center" style="margin-top:8px">
      <button class="btn-big" onclick="proceedAfterChallenge()">🌌 새벽 암시장으로 →</button>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   새벽 암시장 — 밤 수익으로 낮을 강화하는 역방향 고리
   ═══════════════════════════════════════════════════════════════ */
function renderDawnShop() {
  S.phase = 'dawn'; S.timeLabel = '새벽 2:00';
  updateHUD();
  const items = UPGRADES.filter(u => (u.act || 1) <= actOf()).map(u => {
    const cost = CONFIG.UPGRADE_COSTS[u.id];
    const owned = !!S.upgrades[u.id];
    const cantAfford = cost > S.gold;
    return `
      <div class="panel" style="margin:6px 0; padding:12px">
        <div class="row" style="align-items:center; flex-wrap:nowrap; gap:10px">
          <span style="font-size:34px">${u.emoji}</span>
          <div style="flex:1">
            <h3 style="font-size:16px">${u.name} ${owned ? '<span class="good">— 보유 중 ✔</span>' : ''}</h3>
            <p class="dim" style="font-size:13px">${u.desc}</p>
          </div>
          ${owned ? '' : `<button class="btn-pink" style="white-space:nowrap" onclick="buyUpgrade('${u.id}')" ${cantAfford ? 'disabled' : ''}>${fmt(cost)} G</button>`}
        </div>
      </div>`;
  }).join('');
  // 후원 후보는 하룻밤 동안 고정 (재렌더링해도 안 바뀜)
  if (S.sponsorOffersDay !== S.day) {
    S.sponsorOffers = shuffle(S.fighters.map((_, i) => i).filter(i => i !== S.sponsorIdx)).slice(0, 3);
    S.sponsorOffersDay = S.day;
  }
  const debtPanel = `
    <div class="panel" style="margin:6px 0; padding:12px; border-color:#a03a3a">
      <h3 style="font-size:16px">💸 김사장 빚 상환 창구</h3>
      ${S.debt > 0 ? `
        <p style="font-size:14px">남은 빚: <b class="bad">${fmt(S.debt)} G</b> <span class="dim">(내일 아침 이자 +${Math.round(CONFIG.DEBT_INTEREST * 100)}%)</span></p>
        <div style="margin-top:6px">
          <button class="btn-ghost" onclick="repayDebt(1000)" ${S.gold < 1000 || S.debt <= 0 ? 'disabled' : ''}>1,000 갚기</button>
          <button class="btn-ghost" onclick="repayDebt(5000)" ${S.gold < 5000 || S.debt <= 0 ? 'disabled' : ''}>5,000 갚기</button>
          <button class="btn-pink" onclick="repayDebt('all')" ${S.gold < S.debt ? 'disabled' : ''}>전액 상환 (${fmt(S.debt)} G)</button>
        </div>
        <p class="dim" style="font-size:12px; margin-top:4px">김사장 부하: "일찍 갚을수록 이자가 덜 붙는 거, 알지?"</p>`
      : `<p class="good">✔ 빚 청산 완료! 김사장이 아쉬운 표정으로 차용증을 찢었다.</p>
        ${actOf() >= 2 ? `
        <div class="row" style="align-items:center; margin-top:6px">
          <span class="dim" style="font-size:13px">김사장: "필요하면 또 빌려주지. 이자는 알지?"</span>
          <span style="flex:1"></span>
          <button class="btn-ghost" onclick="borrowLoan()">💸 ${fmt(CONFIG.LOAN_AMOUNT)} G 빌리기 (이자 ${Math.round(CONFIG.DEBT_INTEREST * 100)}%/일)</button>
        </div>` : ''}`}
    </div>`;
  const sponsorPanel = `
    <div class="panel" style="margin:6px 0; padding:12px">
      <h3 style="font-size:16px">🤝 파이터 후원 계약 <span class="dim" style="font-size:12px">(계약금 ${fmt(CONFIG.SPONSOR_COST)} G · 승리 시마다 +${fmt(CONFIG.SPONSOR_WIN_CUT)} G · 소문 전부 진위 확인)</span></h3>
      ${S.sponsorIdx !== null ? `<p style="font-size:14px">현재 계약: <b class="accent">${S.fighters[S.sponsorIdx].emoji} ${S.fighters[S.sponsorIdx].name}</b> (${S.fighters[S.sponsorIdx].w}승 ${S.fighters[S.sponsorIdx].l}패) — 새 계약 시 자동 해지</p>` : '<p class="dim" style="font-size:13px">아직 후원 중인 파이터가 없다.</p>'}
      <div class="row" style="margin-top:6px">
        ${S.sponsorOffers.map(i => { const f = S.fighters[i]; return `
          <div class="panel" style="flex:1; min-width:170px; margin:0; padding:8px">
            <p class="center" style="font-size:26px">${f.emoji}</p>
            <p class="center" style="font-size:13px">${f.name}</p>
            <p class="center dim" style="font-size:12px">${f.w}승 ${f.l}패 · 공${f.atk}/방${f.def}/속${f.spd}</p>
            <div class="center"><button class="btn-ghost" style="font-size:13px" onclick="signSponsor(${i})" ${CONFIG.SPONSOR_COST > S.gold ? 'disabled' : ''}>계약</button></div>
          </div>`; }).join('')}
      </div>
    </div>`;
  $('screen').innerHTML = `
    <div class="scene scene-night">
      <div class="crowd"></div>
      <div class="neon neon-l"></div><div class="neon neon-r"></div>
      <div style="position:relative; z-index:2">
        <h2 class="center neon-pink" style="margin-top:4px">🌌 새벽 암시장</h2>
        <p class="center dim" style="font-size:14px">격투장 뒷골목의 장물아비가 좌판을 벌였다.<br>밤에 번 돈으로 빚을 갚거나, 낮 장사를 강화하거나 — 선택은 당신 몫이다.</p>
        ${debtPanel}
        ${sponsorPanel}
        ${items}
        <div class="center" style="margin-top:10px">
          <button class="btn-big" onclick="startDay()">잠자리에 든다 (다음 날로) →</button>
        </div>
      </div>
    </div>`;
  updateDebug();
}

function buyUpgrade(id) {
  const cost = CONFIG.UPGRADE_COSTS[id];
  if (S.upgrades[id] || cost > S.gold) return;
  S.gold -= cost;
  S.upgrades[id] = true;
  sndGood();
  renderDawnShop();
}

function borrowLoan() {
  sndClick();
  S.debt += CONFIG.LOAN_AMOUNT;
  S.gold += CONFIG.LOAN_AMOUNT;
  S.stats.loans++;
  updateHUD();
  renderDawnShop();
}

function repayDebt(amt) {
  const pay = amt === 'all' ? S.debt : Math.min(amt, S.debt);
  if (pay <= 0 || pay > S.gold) return;
  S.gold -= pay;
  S.debt -= pay;
  if (S.debt <= 0) { S.debt = 0; sndDrop(); } else { sndGood(); }
  updateHUD();
  renderDawnShop();
}

function signSponsor(i) {
  if (CONFIG.SPONSOR_COST > S.gold || S.sponsorIdx === i) return;
  S.gold -= CONFIG.SPONSOR_COST;
  S.sponsorIdx = i;
  // 방금 계약한 파이터는 후보 목록에서 제외
  S.sponsorOffers = S.sponsorOffers.filter(x => x !== i);
  sndGood();
  updateHUD();
  renderDawnShop();
}

/* ═══════════════════════════════════════════════════════════════
   결과 화면 (7일 종료)
   ═══════════════════════════════════════════════════════════════ */
function renderResult() {
  S.phase = 'result'; setTheme('night'); updateHUD();
  const st = S.stats;
  const net = S.gold - S.debt; // 순자산 = 보유 골드 − 남은 빚
  const delta = net - (CONFIG.START_GOLD - CONFIG.DEBT_START);
  const avgBuyRatio = st.deals ? st.buyRatioSum / st.deals : 0; // 진짜 가치 대비 평균 매입가율
  const hitRate = st.bets ? st.betWins / st.bets : 0;
  const avgEst = st.bets ? st.houseEstSum / st.bets : 0;
  const edge = st.bets ? hitRate - avgEst : 0;
  let grade = 'F', comment = '';
  for (const [cut, g, c] of CONFIG.FINAL_GRADES) {
    if (net >= cut) { grade = g; comment = c; break; }
  }
  let storyLine;
  if (S.endingId === 'debt_fail') {
    storyLine = '💸 8일째 아침, 김사장의 부하들이 들이닥쳤다. 갚을 돈이 없다. 전당포 열쇠는 그의 손에 넘어갔고, 당신은 뒷골목으로 사라졌다... <b>[배드 엔딩: 빚의 무게]</b>';
  } else if (S.endingId === 'act2_fail') {
    storyLine = '🚬 회장이 고개를 저었다. "아깝군." 당신의 눈은 이제 회장의 것이다 — 격투장 구석에서 남의 장물이나 감정하며 산다. <b>[엔딩: 회장의 감정사]</b>';
  } else if (S.day >= CONFIG.DAYS) {
    storyLine = net >= 100000
      ? '👑 그랜드 파이널의 함성이 잦아들 무렵, 거리의 모두가 알게 됐다 — 이 도시의 돈이 어디로 흐르는지를. <b>[진 엔딩: 지하경제의 왕]</b>'
      : net >= 60000
        ? '🥊 회장이 은퇴를 선언하며 당신에게 잔을 건넸다. 지하 격투장의 새 주인이 탄생했다. <b>[엔딩: 격투장의 새 주인]</b>'
        : '🏪 전당포는 이제 거리의 명물이 됐다. 낮에는 감정, 밤에는 베팅 — 나쁘지 않은 인생이다. <b>[엔딩: 이름난 전당포 주인]</b>';
  } else {
    storyLine = S.debt > 0
      ? `💸 아직 빚 ${fmt(S.debt)} G가 남은 채 장부를 덮었다. (${S.day}일차 중간 결산 — 이야기는 계속된다)`
      : `📜 ${S.day}일차의 중간 결산. 이야기는 아직 끝나지 않았다.`;
  }
  showTransition('<div>🌅</div><div>7일간의 장사가 끝났다...</div>', () => {
    $('screen').innerHTML = `
      <div class="panel center">
        <h1>📜 최종 결산</h1>
        <p class="huge accent" style="margin:10px 0">${grade}</p>
        <p class="big">"${comment}"</p>
        <p style="margin-top:10px; font-size:15px">${storyLine}</p>
      </div>
      <div class="panel">
        <h3>💰 자산</h3>
        <table>
          <tr><td>진행</td><td>${S.day}일차 / ${CONFIG.DAYS}일 · ${actOf()}막</td></tr>
          <tr><td>최종 보유 골드</td><td>${fmt(S.gold)} G</td></tr>
          <tr><td>남은 빚 (김사장)</td><td class="${S.debt > 0 ? 'bad' : 'good'}">${S.debt > 0 ? '-' + fmt(S.debt) + ' G' : '청산 완료 ✔'}</td></tr>
          <tr><td>순자산</td><td class="accent big">${fmt(net)} G</td></tr>
          <tr><td>시작 대비 (시작 순자산 ${fmt(CONFIG.START_GOLD - CONFIG.DEBT_START)} G)</td><td class="${delta >= 0 ? 'good' : 'bad'} big">${delta >= 0 ? '+' : ''}${fmt(delta)} G</td></tr>
          <tr><td>암시장 도구 투자</td><td>${Object.values(S.upgrades).filter(Boolean).length} / ${UPGRADES.length}종</td></tr>
          <tr><td>단골 확보</td><td>${Object.values(S.regularDeals).filter(v => v >= CONFIG.REGULAR_DEALS_REQ).length}개 유형</td></tr>
          ${st.loans ? `<tr><td>김사장 신세진 횟수</td><td class="bad">${st.loans}회</td></tr>` : ''}
        </table>
      </div>
      <div class="panel">
        <h3>☀️ 낮 — 흥정 성적</h3>
        <table>
          <tr><td>평균 매입가율 (진짜 가치 대비 — 낮을수록 고수)</td><td>${st.deals ? (avgBuyRatio * 100).toFixed(0) + '%' : '-'}</td></tr>
          <tr><td>성사 / 결렬</td><td>${st.deals}건 / ${st.rejected}건</td></tr>
          <tr><td>최고의 한 방 (단일 최대 이익)</td><td class="good">${st.bestDeal > 0 ? '+' + fmt(st.bestDeal) + ' G' : '-'}</td></tr>
          ${st.jackpots ? `<tr><td>🎉 숨은 진품 발굴</td><td class="accent">${st.jackpots}회</td></tr>` : ''}
          ${st.stolenLost ? `<tr><td>🚨 장물 압수 피해</td><td class="bad">${st.stolenLost}회</td></tr>` : ''}
          <tr><td>장사 총손익</td><td class="${st.tradePL >= 0 ? 'good' : 'bad'}">${st.tradePL >= 0 ? '+' : ''}${fmt(st.tradePL)} G</td></tr>
        </table>
      </div>
      <div class="panel">
        <h3>🌙 밤 — 베팅 성적</h3>
        <table>
          <tr><td>베팅 횟수 / 적중</td><td>${st.bets}회 / ${st.betWins}회 (${st.bets ? (hitRate * 100).toFixed(0) : '-'}%)</td></tr>
          <tr><td>베팅 총손익</td><td class="${st.betPL >= 0 ? 'good' : 'bad'}">${st.betPL >= 0 ? '+' : ''}${fmt(st.betPL)} G</td></tr>
          <tr><td>판단 우위 (적중률 − 하우스 추정)</td>
              <td class="${edge >= 0 ? 'good' : 'bad'}">${st.bets ? (edge >= 0 ? '+' : '') + (edge * 100).toFixed(1) + '%p' : '-'}</td></tr>
          <tr><td>전설 부품 ✦</td><td class="accent">${st.drops}개</td></tr>
          ${st.sponsorIncome ? `<tr><td>🤝 후원 지분 수익</td><td class="good">+${fmt(st.sponsorIncome)} G</td></tr>` : ''}
          ${st.playerFights ? `<tr><td>🥋 직접 출전</td><td>${st.playerWins}승 ${st.playerFights - st.playerWins}패 <span class="${st.challengePL >= 0 ? 'good' : 'bad'}">(${st.challengePL >= 0 ? '+' : ''}${fmt(st.challengePL)} G)</span></td></tr>` : ''}
        </table>
        <p class="dim" style="margin-top:6px">판단 우위가 +라면, 당신은 소문을 읽어 하우스보다 정확히 예측한 것이다.</p>
      </div>
      <div class="center" style="margin:16px 0">
        <button class="btn-big" onclick="renderTitle()">다시 개업하기</button>
      </div>`;
  }, 1400);
}

/* ═══════════════════════════════════════════════════════════════
   디버그 패널 ([D] 토글 — 밸런스 검증용)
   ═══════════════════════════════════════════════════════════════ */
let debugOn = false;
document.addEventListener('keydown', (e) => {
  if (e.key === 'd' || e.key === 'D' || e.key === 'ㅇ') {
    debugOn = !debugOn;
    $('debug').classList.toggle('show', debugOn);
    updateDebug();
  }
});

function updateDebug() {
  if (!debugOn) return;
  let html = `<b>[DEBUG]</b> day=${S.day} phase=${S.phase} gold=${fmt(S.gold)} 빚=${fmt(S.debt || 0)}<br>이벤트=${S.event ? S.event.name : '-'}<br>도구=${Object.keys(S.upgrades || {}).filter(k => S.upgrades[k]).join(',') || '-'} 후원=${S.sponsorIdx !== null && S.fighters[S.sponsorIdx] ? S.fighters[S.sponsorIdx].name : '-'}<br>`;
  if (S.phase === 'day' && S.customers[S.custIdx]) {
    const c = S.customers[S.custIdx];
    html += `── 현재 손님 ──<br>
      진짜가치 V = ${fmt(c.V)}<br>
      요구가 = ${fmt(c.asking)} / 현재 D = ${S.haggle ? fmt(S.haggle.D) : '-'}<br>
      최저수락가 M = ${fmt(c.M)} / 인내심 = ${S.haggle ? S.haggle.P : c.patience}<br>
      장물 = ${c.stolen ? '🚨예' : '아니오'} / 진품 = ${c.jackpot ? '🎉예' : '아니오'}<br>
      함정힌트 = ${c.hasTrap ? '있음: "' + (c.hints.find(h => h.trap) || {}).text + '"' : '없음'}<br>
      가치위치 t = ${c.t.toFixed(2)} / 검수점수 = ${c.partsView.map(p => p.score).join(',')}`;
  }
  if (S.phase === 'night' && S.matches[S.matchIdx] && !S.matches[S.matchIdx].done) {
    const m = S.matches[S.matchIdx];
    const A = S.fighters[m.ia], B = S.fighters[m.ib];
    const fmtR = (rs) => rs.length ? rs.map(r => `${r.fake ? '❌헛' : '✅' + (r.effect * 100).toFixed(0) + '%p'}`).join(',') : '-';
    html += `── 현재 경기 ──<br>
      하우스추정 ${A.name.split(' ')[0]} = ${(m.est * 100).toFixed(1)}%<br>
      실제승률 ${A.name.split(' ')[0]} = ${(m.pActual * 100).toFixed(1)}%<br>
      소문A: ${fmtR(m.rumorsA)}<br>
      소문B: ${fmtR(m.rumorsB)}<br>
      EV(A베팅) = ${((m.pActual * m.oddsA - 1) * 100).toFixed(1)}%<br>
      EV(B베팅) = ${(((1 - m.pActual) * m.oddsB - 1) * 100).toFixed(1)}%`;
  }
  if (S.challenge && S.challenge.oppMove) {
    html += `── 스파링 ──<br>
      상대 실제 수 = ${MOVES[S.challenge.oppMove].name}<br>
      텔 = ${S.challenge.tellTruth ? '✅ 진짜' : '❌ 페인트'}`;
  }
  $('debug').innerHTML = html;
}

/* 시작 */
renderTitle();
</script>
</body>
</html>
